  <line x1="222" y1="147" x2="264" y2="147" stroke="#B88A1A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(184, 138, 26);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
