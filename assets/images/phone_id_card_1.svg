<svg width="100%" viewBox="180 53 407 540" xmlns="http://www.w3.org/2000/svg">

  <!-- Credit card (vertical, 20% longer = 300px tall, left side, top-aligned) -->
  <rect x="200" y="80" width="160" height="300" rx="16" fill="#5B78A8" style="fill:rgb(91, 120, 168);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="200" y="80" width="160" height="300" rx="16" fill="none" stroke="#7090BE" stroke-width="1.2" opacity="0.5" style="fill:none;stroke:rgb(112, 144, 190);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="200" y="80" width="160" height="66" rx="16" fill="white" opacity="0.05" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.05;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

